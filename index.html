<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星M 外送試算</title>
    <!-- 引入 LINE LIFF SDK -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fdfdfb; color: #2c4c38; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; border-radius: 16px; padding: 30px; max-width: 400px; width: 100%; box-shadow: 0 10px 25px rgba(35,67,48,0.08); text-align: center; border: 1px solid #e1e8e4; }
        h2 { margin-top: 0; color: #234330; font-size: 24px; }
        p { font-size: 16px; line-height: 1.5; color: #53705e; }
        .btn { background: #df6c4f; color: white; border: none; padding: 14px 28px; font-size: 16px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 15px; }
        .btn:active { transform: scale(0.98); background: #c95c41; }
        .result { margin-top: 25px; padding: 15px; border-radius: 8px; background: #f4f6f2; display: none; text-align: left; border: 1px dashed #c1d0c7; }
        .result h3 { margin: 0 0 8px 0; color: #234330; font-size: 18px; }
        .highlight { color: #df6c4f; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛵 外送距離試算</h2>
        <p>請點選下方按鈕，我們將快速為您估算外送杯數標準。</p>
        <button class="btn" onclick="startLocation()">📍 點我試算 !</button>
        
        <div id="resultBox" class="result">
            <h3>試算結果：</h3>
            <p>與店面距離：<span id="distVal" class="highlight">-</span> 公里</p>
            <p>外送標準：<span id="standardVal" class="highlight">-</span></p>
            <!-- 傳送按鈕 -->
            <button id="sendBtn" class="btn" style="background:#234330; display:none;" onclick="sendToChat()">💬 回傳到聊天室</button>
        </div>
    </div>

    <script>
        // === 🔧 設定區（請務必填入您的 LIFF ID） ===
        const MY_LIFF_ID = "2010743612-VDzR3yaa"; 
        const STORE_LAT = 24.96307; // 店家經緯度
        const STORE_LNG = 121.22582;
        // ======================================

        let finalMessage = "";

        // 初始化 LIFF
        liff.init({ liffId: MY_LIFF_ID })
            .then(() => { console.log("LIFF 初始化成功"); });

        // 啟動定位
        function startLocation() {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const dist = getDistance(STORE_LAT, STORE_LNG, position.coords.latitude, position.coords.longitude);
                    showResult(dist);
                },
                () => { alert("定位失敗，請確保權限已開啟。"); },
                { enableHighAccuracy: true }
            );
        }

        // 計算距離公式
        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
        }

        // 顯示結果
        function showResult(dist) {
            document.getElementById("resultBox").style.display = "block";
            document.getElementById("distVal").innerText = dist;
            
            let ruleText = "";
            if (dist <= 1.0) ruleText = "滿 5 杯外送";
            else if (dist <= 3.0) ruleText = "滿 8 杯外送";
            else ruleText = "超出範圍，請來電詢問";
            
            document.getElementById("standardVal").innerText = ruleText;
            finalMessage = `🎯 外送試算：距離 ${dist} 公里，符合【${ruleText}】。`;
            
            if (liff.isInClient()) document.getElementById("sendBtn").style.display = "block";
        }

        // 關鍵：將結果傳送並觸發自動回應 (傳送兩則訊息)
        function sendToChat() {
            liff.sendMessages([
                { type: 'text', text: finalMessage }, // 第一則：試算結果
                { type: 'text', text: "確認外送標準" }   // 第二則：觸發 LINE OA 自動回應的關鍵字
            ])
            .then(() => { liff.closeWindow(); })
            .catch((err) => { alert("傳送失敗：" + err); });
        }
    </script>
</body>
</html>
