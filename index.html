<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1.0">
<title>星M 外送門檻試算</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    background:#f5f5f5;
    font-family:
    "Microsoft JhengHei",
    sans-serif;
    padding:20px;
}
.card{
    max-width:560px;
    margin:auto;
    background:white;
    border-radius:18px;
    box-shadow:F
    0 8px 25px
    rgba(0,0,0,.1);
    padding:30px;
}
h1{
    text-align:center;
    color:#00897b;
    margin-bottom:10px;
}
.sub{
    text-align:center;
    color:#666;
    margin-bottom:25px;
    line-height:1.8;
}
.mode-box{

    background:#fff;

    border-radius:12px;

    padding:15px;

    margin-bottom:15px;

    text-align:center;

}

.mode-title{
    font-size:24px;
    font-weight:700;
    margin-bottom:20px;
    text-align:left;
}

.radio-item{
    display:flex;
    align-items:center;

    width:320px;
    margin:18px auto;

    font-size:22px;
}
	
.radio-item input{
    margin-right:12px;
    flex-shrink:0;
}

#addressBox{
    width:100%;
    margin-top:15px;
}
#addressInput{
    width:100%;
    padding:14px 16px;
    font-size:20px;

    border:1px solid #ccc;
    border-radius:12px;
}

.query-right{
    width:100%;
    margin-top:10px;
}

.query-right img{
    width:100%;
    height:auto;

    display:block;

    border-radius:22px;
    border:3px solid #fff;
    box-shadow:0 8px 20px rgba(0,0,0,.18);
}
	
button{
    width:100%;
    border:0;
    border-radius:12px;
    padding:18px;
    font-size:20px;
    font-weight:bold;
    color:white;
    background:#00a884;
    cursor:pointer;
}
.send-result-btn{
    margin-top:20px;
    background:#06C755;
}

.send-result-btn:hover{
    background:#05a848;
}	
button:hover{
    background:#00916f;
}
button:disabled{
    background:#bdbdbd;
}
#loading{
    display:none;
    text-align:center;
    margin-top:20px;
    color:#ff9800;
    font-size:18px;
}
#result{
    display:none;
    background:#f8f8f8;
    border-radius:16px;
    padding:20px;
    margin-top:20px;

    scroll-margin-top:20px;
}
.item{
    margin-bottom:18px;
    line-height:1.8;
}
.label{
    color:#666;
}
.value{
    font-size:22px;
    font-weight:bold;
    color:#e65100;
}
        table{
            width:100%;
            border-collapse:collapse;
            margin-top:20px;
        }
        th{
            background:#00a884;
            color:white;
            padding:12px;
            font-size:16px;
        }
        td{
            border-bottom:1px solid #e0e0e0;
            padding:12px;
            text-align:center;
            font-size:15px;
        }
        tr.active{
            background:#fff3cd;
            font-weight:bold;
        }
        .notice{
            color:#d32f2f;
            font-weight:bold;
        }
        @media(max-width:600px){
            .card{
                padding:20px;
            }
    h1{
        font-size:24px;
        line-height:1.3;
    }
            button{
                font-size:18px;
                padding:16px;
            }
            .value{
                font-size:20px;
            }
	

.query-right img{
    width:100%;
    max-width:none;
    height:auto;
}
        }
/* ===== 成功提示 ===== */

#toast{
    position:fixed;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(0,0,0,.35);

    opacity:0;
    visibility:hidden;

    transition:.25s;

    z-index:9999;
}

#toast.show{
    opacity:1;
    visibility:visible;
}

.toast-box{
    transform:scale(.9);
    transition:.25s;
}

#toast.show .toast-box{
    transform:scale(1);
}

.toast-icon{
    font-size:52px;
    margin-bottom:10px;
}

.toast-title{
    font-size:22px;
    font-weight:bold;
    color:#06C755;
}

.toast-sub{
    margin-top:8px;
    font-size:15px;
    color:#666;
}
	
</style>
</head>
<body>
<div class="card">
    <h1>🧋 中壢海華店 外送門檻試算</h1>

    <div class="mode-box">

        <div class="mode-title">
            📍 選擇查詢方式
        </div>

        <label class="radio-item">
            <input
                type="radio"
                name="mode"
                value="gps"
                checked>
            使用目前位置（GPS）
        </label>

        <label class="radio-item">
            <input
                type="radio"
                name="mode"
                value="address">
            輸入地址／地標
        </label>

        <div id="addressBox" style="display:none;">

            <input
                id="addressInput"
                type="text"
                placeholder="例如：中壢SOGO、A18高鐵站">
        </div>
    </div>
        <!-- 新品圖片放這 -->
        <div class="query-right">
            <img src="starm.png">
        </div>

    <button
        id="calcBtn"
        onclick="startLocation()">
        📍 開始試算外送門檻
    </button>
    <div id="loading">
        📍 正在取得定位...
    </div>
    <div id="result">
        <div class="item">
            <div class="label">
                您的位置
            </div>
            <div
                id="address"
                class="value">
                -
            </div>
        </div>
        <div class="item">
            <div class="label">
                道路距離
            </div>
            <div
                id="distance"
                class="value">
                -
            </div>
        </div>
        <div class="item">
            <div class="label">
                配送方式
            </div>
            <div
                id="vehicle"
                class="value">
                -
            </div>
        </div>
        <div class="item">
            <div class="label">
                外送門檻
            </div>
            <div
                id="minimum"
                class="value">
                -
            </div>
        </div>
        <table id="ruleTable">
            <thead>
                <tr>
                    <th>道路距離</th>
                    <th>外送門檻</th>
                </tr>
            </thead>
            <tbody id="ruleBody">
            </tbody>
        </table>
		<button
		    id="sendResultBtn"
		    class="send-result-btn"
		    onclick="sendResultToChat()">
		    💬 傳送到聊天室
		</button>
    </div>
</div>
<script>
//==============================
// 基本設定
//==============================
const LIFF_ID = "2010743612-VDzR3yaa";
const GOOGLE_API_KEY = "AIzaSyCPtYdWKJtn3prltPDlMayZJBylyYgOJwY";
const SHOP = {
    lat:24.963070,
    lng:121.225820
};
//==============================
// 外送規則
//==============================
const RULES=[
    {max:1000,cup:5,money:300},
    {max:2000,cup:8,money:500},
    {max:3000,cup:12,money:750},
    {max:4000,cup:15,money:1000},
    {max:5000,cup:20,money:1300},
    {max:6000,cup:25,money:1650},
    {max:7000,cup:30,money:1950},
    {max:8000,cup:38,money:2450},
    {max:9000,cup:45,money:2900},
    {max:10000,cup:55,money:3600}
];
//==============================
// LIFF 初始化
//==============================
window.onload=async()=>{
    try{
        await liff.init({liffId:LIFF_ID});
    }catch(e){
        console.log(e);
    }
};

//==============================
// Loading
//==============================
function loading(show){
    document.getElementById("loading").style.display=
        show?"block":"none";
    document.getElementById("calcBtn").disabled=show;
}
//==============================
// 取得目前門檻
//==============================
function getRule(distance){
    for(const r of RULES){
        if(distance<=r.max){
            return r;
        }
    }
    return null;
}
function needCar(distance, rule) {
    return distance > 5000 || (rule && rule.cup >= 30);
}	
//==============================
// 建立距離表
//==============================
function buildTable(distance){
    const body=document.getElementById("ruleBody");
    body.innerHTML="";
    let selected=false;
    RULES.forEach(rule=>{
        const tr=document.createElement("tr");
        if(!selected && distance<=rule.max){
            tr.className="active";
            selected=true;
        }
        tr.innerHTML=`
        <td>
          ${
              rule.max === 1000
              ? "0.0～1.0 km"
              : `>${((rule.max - 1000) / 1000).toFixed(1)}～${(rule.max / 1000).toFixed(1)} km`
           }
      </td>
        <td>
            ${rule.cup} 杯 / $${rule.money}
        </td>
        `;
        body.appendChild(tr);
    });
    if(distance>10000){
        const tr=document.createElement("tr");
        tr.className="active";
        tr.innerHTML=`
        <td>
            超過 10 km
        </td>
        <td class="notice">
            請來電詢問
        </td>
        `;
        body.appendChild(tr);
    }
}

//==============================
// Google Routes API
//==============================
async function getRoadDistance(
    userLat,
    userLng,
    travelMode = "TWO_WHEELER"
){

    const body = {
        origin:{
            location:{
                latLng:{
                    latitude:userLat,
                    longitude:userLng
                }
            }
        },
        destination:{
            location:{
                latLng:{
                    latitude:SHOP.lat,
                    longitude:SHOP.lng
                }
            }
        },
        travelMode: travelMode,
        computeAlternativeRoutes: true
    };

    // 汽車模式才加 routingPreference
    if (travelMode === "DRIVE") {
        body.routingPreference = "TRAFFIC_UNAWARE";
    }

    const response = await fetch(
        "https://routes.googleapis.com/directions/v2:computeRoutes",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json",
                "X-Goog-Api-Key":GOOGLE_API_KEY,
                "X-Goog-FieldMask":"routes.distanceMeters,routes.duration,routes.routeLabels,routes.polyline.encodedPolyline"
            },
            body: JSON.stringify(body)
        }
    );

    if(!response.ok){
        throw new Error("Routes API Error");
    }

    const json = await response.json();

	console.log("==========");
	console.log("Mode:", travelMode);
	
	json.routes.forEach((r, i) => {
	    console.log(
	        i,
	        r.distanceMeters,
	        r.routeLabels,
	        r.polyline.encodedPolyline
	    );
	});
	
	if (!json.routes || json.routes.length === 0) {
	    throw new Error("No Route");
	}

    return json.routes[0].distanceMeters;
}

//==============================
// 地址轉經緯度
//==============================
async function geocodeAddress(address){
    const response = await fetch(
        `https://maps.googleapis.com/maps/api/geocode/json?address=${encodeURIComponent(address)}&language=zh-TW&key=${GOOGLE_API_KEY}`
    );

    if(!response.ok){
        throw new Error("Geocode Error");
    }

    const json = await response.json();
    console.log(json);

    if(json.status !== "OK" || !json.results.length){
        throw new Error(json.status);
    }

    return {
        lat: json.results[0].geometry.location.lat,
        lng: json.results[0].geometry.location.lng,
        address: json.results[0].formatted_address
    };
}

//==============================
// 反向地理編碼
//==============================
async function reverseGeocode(
    lat,
    lng
){
    const response=
        await fetch(
            `https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&language=zh-TW&key=${GOOGLE_API_KEY}`
        );
    if(!response.ok){
        return "未知位置";
    }
    const json=
        await response.json();
    if(
        json.results &&
        json.results.length>0
    ){
        return json.results[0].formatted_address;
    }
    return "未知位置";
}
     
//==============================
// 顯示結果
//==============================
function showResult(
    address,
    distance
){
    const rule=getRule(distance);
    const finalVehicle = needCar(distance, rule) ? "汽車" : "機車";

    document.getElementById("result").style.display="block";

    document.getElementById("address").textContent=
        address;

    document.getElementById("distance").textContent=
        (distance/1000).toFixed(2)+" km";

    if(rule){
        document.getElementById("vehicle").textContent =
            finalVehicle === "汽車"
                ? "🚗 豪華專車外送"
                : "🛵 gogoro外送";

        document.getElementById("minimum").textContent=
            `${rule.cup} 杯 或 $${rule.money}`;
    }
    else{
        document.getElementById("vehicle").textContent="-";
        document.getElementById("minimum").textContent="請來電詢問";
    }

    buildTable(distance);

    // ⭐ 新增這段
setTimeout(() => {
    const result = document.getElementById("result");

    const targetTop =
        result.getBoundingClientRect().top +
        window.pageYOffset -
        20;

    window.scrollTo({
        top: targetTop,
        behavior: "smooth"
    });
}, 300);
	
}

//==============================
// 回傳結果到聊天室
//==============================	
async function sendResultToChat(){

    const address =
        document.getElementById("address").textContent.trim();

    const distance =
        document.getElementById("distance").textContent.trim();

    const vehicle =
        document.getElementById("vehicle").textContent.trim();

    const minimum =
        document.getElementById("minimum").textContent.trim();

    const message =
`🧋 星M 外送門檻試算結果

📍 位置：${address}
📏 道路距離：${distance}
🛵 配送方式：${vehicle}
🥤 外送門檻：${minimum}

星M 中壢海華店`;

   try{

    if(!liff.isInClient()){
        alert("請從 LINE 聊天室中開啟此頁面，才能回傳結果");
        return;
    }

    if(!liff.isApiAvailable("sendMessages")){
        alert("目前無法回傳訊息，請從原聊天室重新開啟");
        return;
    }

    await liff.sendMessages([
        {
            type:"text",
            text:message
        }
    ]);

    showToast();

}
catch(error){

    console.error(error);

    alert("❌ 傳送失敗，請稍後再試");

}
}


	
//==============================
// API Key 檢查
//==============================
function checkConfig(){
    if(
        GOOGLE_API_KEY==="YOUR_GOOGLE_API_KEY"
    ){
        alert("請先設定 Google API Key");
        return false;
    }
    if(
        LIFF_ID==="YOUR_LIFF_ID"
    ){
        alert("請先設定 LIFF ID");
        return false;
    }
    return true;
}

//==============================
// 回傳成功 關閉視窗
//==============================	
function showToast(){

    const toast=document.getElementById("toast");

    toast.classList.add("show");

    setTimeout(()=>{
        liff.closeWindow();
    },800);

}
	
//==============================
// 重新包裝入口
//==============================
async function startLocation(){
      const mode = document.querySelector(
          "input[name='mode']:checked"
      ).value;
    if(mode === "gps"){
      if(!checkConfig()){
        return;
    }
    if(!navigator.geolocation){
        alert("瀏覽器不支援定位");
        return;
    }
    loading(true);
    navigator.geolocation.getCurrentPosition(
        async(position)=>{
            try{

			const lat = position.coords.latitude;
			const lng = position.coords.longitude;
			
			// GPS → 地址
			const address = await reverseGeocode(lat, lng);
				
			// 地址 → Google 官方座標
			const place = await geocodeAddress(address);

			console.log("GPS:", lat, lng);
			console.log("Address:", address);
			console.log("Google Place:", place);
			
		let vehicle = "機車";
		
		// 用機車先計算距離
		let distance = await getRoadDistance(place.lat, place.lng, "TWO_WHEELER");
		
		// 先取得目前門檻
		let rule = getRule(distance);
		
		// 超過 5 公里 或 30 杯以上，改用汽車重新計算
		if (needCar(distance, rule)) {
		    distance = await getRoadDistance(place.lat, place.lng, "DRIVE");
		    vehicle = "汽車";
		}

showResult(
    address,
    distance
);
            }
            catch(e){
                console.error(e);
                alert(
                    "Google Routes API 呼叫失敗"
                );
            }
            loading(false);
        },
        (err)=>{
            console.error(err);
            loading(false);
            alert("定位失敗");
        },
        {
            enableHighAccuracy:true,
            timeout:15000,
            maximumAge:0
        }
    );

}else{
loading(true);
    try{

        const keyword = document
            .getElementById("addressInput")
            .value
            .trim();

        if(keyword===""){

            alert("請輸入地址或地標");

            loading(false);

            return;

        }

		const place = await geocodeAddress(keyword);

		let vehicle = "機車";
		
		// 用機車先計算距離
		let distance = await getRoadDistance(
		    place.lat,
		    place.lng,
		    "TWO_WHEELER"
		);
		
		// 先取得目前門檻
		let rule = getRule(distance);
		
		// 超過 5 公里 或 30 杯以上，改用汽車重新計算
		if (needCar(distance, rule)) {
		
		    distance = await getRoadDistance(
		        place.lat,
		        place.lng,
		        "DRIVE"
		    );
		
		    vehicle = "汽車";
		}

        showResult(
            place.address,
            distance
        );

    }catch(e){

        console.error(e);

        alert("找不到該地址");

    }

    loading(false);

}

}
document
.querySelectorAll("input[name='mode']")
.forEach(item => {

    item.addEventListener("change", function(){

        const box = document.getElementById("addressBox");

        if(this.value === "address"){

            box.style.display = "block";

        }else{

            box.style.display = "none";

        }

    });

});      
</script>
	<div id="toast">
    <div class="toast-box">
        <div class="toast-icon">✅</div>
        <div class="toast-title">已傳送到聊天室</div>
        <div class="toast-sub">即將返回 LINE...</div>
    </div>
</div>
</body>
</html>
